name: Staging Validation

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag expected to be running on staging, usually sha-xxxxxxx from CI"
        required: true
        default: "latest"
      staging_url:
        description: "Public staging base URL, for example https://staging.dacn.example.com"
        required: true
      run_10k_load_test:
        description: "Run the 10,000-user k6 cloud test against staging"
        required: true
        type: choice
        options: ["true", "false"]
        default: "true"

permissions:
  contents: read

env:
  HELM_CHART: deploy/helm/dacn

jobs:
  helm-validate:
    name: Helm validate only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Lint staging chart
        run: helm lint "$HELM_CHART" -f "$HELM_CHART/values-staging.yaml"

      - name: Render staging manifests
        run: >
          helm template dacn "$HELM_CHART"
          -f "$HELM_CHART/values-staging.yaml"
          --set global.imageTag="${{ inputs.image_tag }}"
          > /tmp/dacn-staging.yaml

  smoke-test:
    name: Staging smoke test
    runs-on: ubuntu-latest
    needs: helm-validate
    env:
      STAGING_URL: ${{ inputs.staging_url }}
    steps:
      - name: Check staging health
        run: |
          set -euo pipefail
          BASE="${STAGING_URL%/}"
          curl -fsS --max-time 10 "$BASE/api/health"
          curl -fsS --max-time 10 "$BASE/api/auth/health"
          curl -fsS --max-time 10 "$BASE/api/products/health"
          curl -fsS --max-time 10 "$BASE/"

  load-test-10k:
    name: Staging 10k load test
    runs-on: ubuntu-latest
    needs: smoke-test
    if: ${{ inputs.run_10k_load_test == 'true' }}
    env:
      BASE_URL: ${{ inputs.staging_url }}
      AUTH_EMAIL: ${{ secrets.STAGING_TEST_EMAIL }}
      AUTH_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
      PRODUCT_ID: ${{ vars.STAGING_PRODUCT_ID }}
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - name: Run 10k user test in k6 cloud
        run: >
          k6 cloud
          --tag environment=staging
          --tag image_tag="${{ inputs.image_tag }}"
          tests/load/staging-10000-users.js
