name: CI - order service

on:
  push:
    branches: ["develop"]
    paths:
      - "services/backend-order/**"
      - ".github/workflows/ci-order.yml"

  pull_request:
    branches: ["develop"]
    paths:
      - "services/backend-order/**"
      - ".github/workflows/ci-order.yml"

concurrency:
  group: ci-order-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: order - lint / test / audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/backend-order/package-lock.json

      - run: npm ci
        working-directory: services/backend-order

      - run: npm run lint --if-present
        working-directory: services/backend-order

      - run: npm test --if-present -- --passWithNoTests
        working-directory: services/backend-order

      - name: npm audit (non-blocking for lab)
        run: npm audit --audit-level=high --omit=dev || true
        working-directory: services/backend-order
