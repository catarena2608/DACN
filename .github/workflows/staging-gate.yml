name: Staging gate (auto)

on:
  repository_dispatch:
    types: [staging-deployed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to verify (e.g. sha-abc1234)"
        required: false

concurrency:
  group: staging-gate
  cancel-in-progress: false

jobs:
  gate:
    name: Production-readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || github.event.inputs.image_tag || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.MASTER_SSH_KEY }}" > ~/.ssh/gate_key
          chmod 600 ~/.ssh/gate_key

      - name: Run gate on master
        id: gate
        continue-on-error: true
        env:
          MASTER_HOST: ${{ secrets.MASTER_HOST }}
        run: |
          ssh -i ~/.ssh/gate_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "ubuntu@${MASTER_HOST}" << ENDSSH
            set -euo pipefail

            echo "=== Forcing Flux reconciliation ==="
            flux reconcile source git flux-system --timeout=3m
            flux reconcile kustomization lab-apps --timeout=5m

            echo "=== Waiting for staging HelmRelease to be Ready ==="
            flux wait helmrelease dacn --namespace dacn-staging --timeout=15m

            echo "=== Pulling latest DACN repo ==="
            cd ~/DACN
            git pull origin main

            echo "=== Running production-readiness gate ==="
            export EXPECTED_IMAGE_TAG="${IMAGE_TAG}"
            bash scripts/production-readiness-gate.sh
          ENDSSH

      - name: Retrieve gate report
        if: always()
        env:
          MASTER_HOST: ${{ secrets.MASTER_HOST }}
        run: |
          REPORT_DIR=$(ssh -i ~/.ssh/gate_key \
            -o StrictHostKeyChecking=no \
            "ubuntu@${MASTER_HOST}" \
            "ls -1td ~/DACN/reports/production-gate/*/ 2>/dev/null | head -1" 2>/dev/null || true)
          if [ -n "$REPORT_DIR" ]; then
            scp -i ~/.ssh/gate_key \
              -o StrictHostKeyChecking=no \
              "ubuntu@${MASTER_HOST}:${REPORT_DIR}production-readiness-summary.md" \
              gate-report.md || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-report-${{ github.run_id }}
          path: gate-report.md
          if-no-files-found: ignore

      - name: Post gate report to summary
        if: always()
        run: |
          if [ -f gate-report.md ]; then
            cat gate-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No gate report found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail job if gate did not pass
        if: ${{ steps.gate.outcome != 'success' }}
        run: |
          echo "::error::Staging production-readiness gate FAILED — see gate-report artifact."
          exit 1
