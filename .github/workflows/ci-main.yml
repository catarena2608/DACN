name: CI - main (fast staging candidate)

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      force_all:
        description: "Force rebuild all services (ignore change detection)"
        type: boolean
        default: true

concurrency:
  group: main-pipeline
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  COMPOSE_FILE: deploy/compose/docker-compose.yml

jobs:
  changes:
    name: Detect image changes
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.detect.outputs.auth }}
      product: ${{ steps.detect.outputs.product }}
      order: ${{ steps.detect.outputs.order }}
      gateway: ${{ steps.detect.outputs.gateway }}
      frontend: ${{ steps.detect.outputs.frontend }}
      nginx: ${{ steps.detect.outputs.nginx }}
      changed_count: ${{ steps.detect.outputs.changed_count }}
      changed_csv: ${{ steps.detect.outputs.changed_csv }}
      build_matrix: ${{ steps.detect.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changed images
        shell: bash
        run: |
          FORCE_ALL=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORCE_ALL=true
            echo "workflow_dispatch: forcing rebuild of all services."
          else
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
              HEAD="${{ github.event.pull_request.head.sha }}"
            else
              BASE="${{ github.event.before }}"
              HEAD="${{ github.sha }}"
            fi

            if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
              BASE="$(git rev-list --max-parents=0 "$HEAD")"
            fi

            git diff --name-only "$BASE" "$HEAD" > changed-files.txt
            cat changed-files.txt

            if grep -Eq '^\.github/workflows/ci-main\.yml' changed-files.txt; then
              FORCE_ALL=true
              echo "ci-main.yml changed: forcing rebuild of all services."
            fi
          fi

          mark_changed() {
            local key="$1"
            local pattern="$2"

            if $FORCE_ALL || grep -Eq "$pattern" changed-files.txt; then
              echo "$key=true" >> "$GITHUB_OUTPUT"
              CHANGED+=("$key")
            else
              echo "$key=false" >> "$GITHUB_OUTPUT"
            fi
          }

          CHANGED=()
          mark_changed auth '^(services/backend-auth/|packages/)'
          mark_changed product '^(services/backend-product/|packages/)'
          mark_changed order '^(services/backend-order/|packages/)'
          mark_changed gateway '^(apps/gateway/|packages/)'
          mark_changed frontend '^(apps/frontend/|packages/)'
          mark_changed nginx '^deploy/nginx/'

          echo "changed_count=${#CHANGED[@]}" >> "$GITHUB_OUTPUT"
          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "changed_csv=" >> "$GITHUB_OUTPUT"
            echo "build_matrix=[]" >> "$GITHUB_OUTPUT"
            echo "No container image changes detected."
          else
            IFS=,
            echo "changed_csv=${CHANGED[*]}" >> "$GITHUB_OUTPUT"
            echo "Changed images: ${CHANGED[*]}"
            IFS=$'\n'

            BUILD_MATRIX="["
            FIRST_M=true
            for SVC in "${CHANGED[@]}"; do
              case $SVC in
                auth)     ENTRY='{"name":"auth","path":"services/backend-auth"}' ;;
                product)  ENTRY='{"name":"product","path":"services/backend-product"}' ;;
                order)    ENTRY='{"name":"order","path":"services/backend-order"}' ;;
                gateway)  ENTRY='{"name":"gateway","path":"apps/gateway"}' ;;
                frontend) ENTRY='{"name":"frontend","path":"apps/frontend"}' ;;
                *)        continue ;;
              esac
              [ "$FIRST_M" = true ] || BUILD_MATRIX+=","
              BUILD_MATRIX+="$ENTRY"
              FIRST_M=false
            done
            BUILD_MATRIX+="]"
            echo "build_matrix=${BUILD_MATRIX}" >> "$GITHUB_OUTPUT"
          fi

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & test - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.changed_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - run: npm ci
        working-directory: ${{ matrix.service.path }}

      - run: npm run lint || true
        working-directory: ${{ matrix.service.path }}

      - run: npm test || true
        working-directory: ${{ matrix.service.path }}

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev || true
        working-directory: ${{ matrix.service.path }}

  smoke-test:
    name: Compose smoke test
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: ${{ needs.changes.outputs.changed_count != '0' && needs.build.result == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Create .env.dev files
        run: |
          printf '%s' "${{ secrets.AUTH_ENV_DEV }}"     > services/backend-auth/.env.dev
          printf '%s' "${{ secrets.PRODUCT_ENV_DEV }}"  > services/backend-product/.env.dev
          printf '%s' "${{ secrets.ORDER_ENV_DEV }}"    > services/backend-order/.env.dev
          printf '%s' "${{ secrets.GATEWAY_ENV_DEV }}"  > apps/gateway/.env.dev

      - name: Build all images (cached)
        run: docker compose build --parallel

      - name: Pull runtime images
        run: |
          docker pull mongo:latest
          docker pull redis:latest
          docker pull rabbitmq:3-management-alpine

      - name: Start mongo + redis nodes
        env:
          COMPOSE_PARALLEL_LIMIT: 1
        run: |
          docker compose up -d mongo rabbitmq redis-1 redis-2 redis-3
          docker compose ps

          wait_for_container_health() {
            CONTAINER="$1"
            LABEL="$2"
            TIMEOUT="${3:-180}"
            ELAPSED=0

            echo "Waiting for ${LABEL}..."
            until [ "$ELAPSED" -ge "$TIMEOUT" ]; do
              STATUS=$(timeout 10s docker inspect "$CONTAINER" --format='{{.State.Health.Status}}' 2>/dev/null || echo "inspect-timeout")
              echo "  ${LABEL} health=${STATUS} (${ELAPSED}s)"
              [ "$STATUS" = "healthy" ] && return 0
              sleep 5
              ELAPSED=$((ELAPSED+5))
            done

            echo "${LABEL} did not become healthy within ${TIMEOUT}s"
            docker compose ps || true
            timeout 10s docker inspect "$CONTAINER" || true
            docker compose logs --tail=160 "$CONTAINER" || true
            return 1
          }

          echo "Waiting for MongoDB..."
          timeout 60 bash -c \
            'until docker compose exec -T mongo mongosh --eval "db.adminCommand(\"ping\")" --quiet 2>/dev/null; \
             do sleep 3; done'
          echo "MongoDB ready"

          wait_for_container_health rabbitmq RabbitMQ 180
          docker compose exec -T rabbitmq rabbitmq-diagnostics -q ping
          echo "RabbitMQ ready"

      - name: Init Redis cluster
        run: |
          docker compose up redis-cluster-init
          sleep 5
          STATE=$(docker compose exec -T redis-1 redis-cli cluster info | grep cluster_state | cut -d: -f2 | tr -d '\r')
          echo "Current Redis Cluster State: '$STATE'"
          if [ "$STATE" != "ok" ]; then
            echo "Redis cluster failed with state: $STATE"
            docker compose logs redis-cluster-init
            exit 1
          fi
          echo "Redis cluster OK (3 nodes)"

      - name: Start application services
        run: docker compose up -d --no-deps auth product order gateway frontend nginx

      - name: Wait for services healthy
        run: |
          TIMEOUT=120
          ELAPSED=0
          until [ $ELAPSED -ge $TIMEOUT ]; do
            A=$(docker inspect auth-service    --format='{{.State.Health.Status}}' 2>/dev/null || echo "x")
            P=$(docker inspect product-service --format='{{.State.Health.Status}}' 2>/dev/null || echo "x")
            O=$(docker inspect order-service   --format='{{.State.Health.Status}}' 2>/dev/null || echo "x")
            G=$(docker inspect api-gateway     --format='{{.State.Health.Status}}' 2>/dev/null || echo "x")
            echo "  auth=$A | product=$P | order=$O | gateway=$G (${ELAPSED}s)"
            [ "$A" = "healthy" ] && [ "$P" = "healthy" ] && [ "$O" = "healthy" ] && [ "$G" = "healthy" ] && break
            sleep 5; ELAPSED=$((ELAPSED+5))
          done
          [ $ELAPSED -ge $TIMEOUT ] && { docker compose logs auth product order gateway rabbitmq; exit 1; }
          echo "All services healthy"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke tests (node:test)
        run: node --test tests/smoke/smoke.test.js
        env:
          AUTH_URL:    http://localhost:3001
          PRODUCT_URL: http://localhost:3002
          ORDER_URL:   http://localhost:3003
          GATEWAY_URL: http://localhost:3000
          NGINX_URL:   http://localhost

      - name: Write job summary
        if: always()
        run: |
          echo "## Smoke test - ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| container | status | health |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          for C in auth-service product-service order-service api-gateway frontend-ui nginx-proxy mongodb rabbitmq redis-1 redis-2 redis-3; do
            ST=$(docker inspect $C --format='{{.State.Status}}'              2>/dev/null || echo "-")
            HL=$(docker inspect $C --format='{{.State.Health.Status}}'       2>/dev/null || echo "-")
            IC=$([ "$ST" = "running" ] && echo "ok" || echo "fail")
            echo "| $IC $C | $ST | $HL |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Print logs on failure
        if: failure()
        run: |
          for SVC in auth product order gateway rabbitmq; do
            echo "=== $SVC ===" && docker compose logs --tail=60 $SVC
          done

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  push-images:
    name: Push - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: [changes, smoke-test, gitleaks]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.changed_count != '0' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: auth
            context: ./services/backend-auth
            dockerfile: ./services/backend-auth/dockerfile
          - name: product
            context: ./services/backend-product
            dockerfile: ./services/backend-product/dockerfile
          - name: order
            context: ./services/backend-order
            dockerfile: ./services/backend-order/dockerfile
          - name: gateway
            context: ./apps/gateway
            dockerfile: ./apps/gateway/Dockerfile
          - name: frontend
            context: ./apps/frontend
            dockerfile: ./apps/frontend/Dockerfile
          - name: nginx
            context: ./deploy/nginx
            dockerfile: ./deploy/nginx/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Skip unchanged image
        if: ${{ needs.changes.outputs[matrix.service.name] != 'true' }}
        run: echo "${{ matrix.service.name }} image did not change; skipping GHCR push."

      - name: Log in to GHCR
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build image locally
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Scan image for vulnerabilities (Trivy)
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/${{ matrix.service.name }}:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push to GHCR
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}

      - name: Summary
        if: ${{ needs.changes.outputs[matrix.service.name] == 'true' }}
        run: |
          echo "### ${{ matrix.service.name }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  update-gitops-staging:
    name: Update GitOps staging
    runs-on: ubuntu-latest
    needs: [changes, push-images]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.changed_count != '0' }}
    permissions:
      contents: read

    steps:
      - name: Compute immutable image tag
        run: echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Check GitOps token
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          if [ -z "$GITOPS_TOKEN" ]; then
            echo "::error::Missing GITOPS_TOKEN. Create a fine-grained PAT that can write to dacn-gitops."
            exit 1
          fi

      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Checkout GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPOSITORY || format('{0}/dacn-gitops', github.repository_owner) }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update staging image tag
        env:
          CHANGED_SERVICES: ${{ needs.changes.outputs.changed_csv }}
        run: |
          IFS=',' read -ra SERVICES <<< "$CHANGED_SERVICES"
          bash scripts/update-gitops-staging.sh gitops "$IMAGE_TAG" "${SERVICES[@]}"

      - name: Commit and push GitOps change
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/dacn/staging/helmrelease.yaml

          if git diff --cached --quiet; then
            echo "GitOps staging already uses $IMAGE_TAG"
            exit 0
          fi

          git commit -m "chore: deploy $IMAGE_TAG to staging"
          git push

      - name: Summary
        run: |
          echo "### GitOps staging update" >> "$GITHUB_STEP_SUMMARY"
          echo "Updated staging imageTag to \`$IMAGE_TAG\`." >> "$GITHUB_STEP_SUMMARY"
