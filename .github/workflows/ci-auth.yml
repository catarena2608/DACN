name: CI - auth service

on:
  push:
    branches: ["develop"]
    paths:
      - "services/backend-auth/**"
      - ".github/workflows/ci-auth.yml"

  pull_request:
    branches: ["develop"]
    paths:
      - "services/backend-auth/**"
      - ".github/workflows/ci-auth.yml"

concurrency:
  group: ci-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: auth - lint / test / audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/backend-auth/package-lock.json

      - run: npm ci
        working-directory: services/backend-auth

      - run: npm run lint || true
        working-directory: services/backend-auth

      - run: npm test || true
        working-directory: services/backend-auth

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev || true
        working-directory: services/backend-auth
