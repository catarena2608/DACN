version: "3.8"

services:
  backend:
    build: ./backend-auth
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydacn
    depends_on:
      - mongo

  frontend:
    build: ./frontend/client
    ports:
      - "3000:3000"

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  
  nginx:
    image: ./nginx
    ports:
      - "80:80"
  
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"