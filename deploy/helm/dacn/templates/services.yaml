{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "dacn.serviceLabels" (list $serviceName $) | nindent 4 }}
spec:
  type: {{ $service.service.type }}
  ports:
    - port: {{ $service.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "dacn.serviceSelectorLabels" (list $serviceName $) | nindent 4 }}
{{- end }}
{{- end }}
