services:
  auth:
    build:
      context: ../../services/backend-auth
      dockerfile: dockerfile
    container_name: auth-service
    env_file:
      - path: ../../services/backend-auth/.env.example
      - path: ../../services/backend-auth/.env.dev
        required: false
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  product:
    build:
      context: ../../services/backend-product
      dockerfile: dockerfile
    container_name: product-service
    env_file:
      - path: ../../services/backend-product/.env.example
      - path: ../../services/backend-product/.env.dev
        required: false
    ports:
      - "3002:3002"
    depends_on:
      mongo:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  order:
    build:
      context: ../../services/backend-order
      dockerfile: dockerfile
    container_name: order-service
    env_file:
      - path: ../../services/backend-order/.env.example
      - path: ../../services/backend-order/.env.dev
        required: false
    ports:
      - "3003:3003"
    depends_on:
      mongo:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      product:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  frontend:
    build: ../../apps/frontend
    container_name: frontend-ui
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  gateway:
    build: ../../apps/gateway
    container_name: api-gateway
    env_file:
      - path: ../../apps/gateway/.env.example
      - path: ../../apps/gateway/.env.dev
        required: false
    ports:
      - "3000:3000"
    depends_on:
      auth:
        condition: service_healthy
      product:
        condition: service_healthy
      order:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

  nginx:
    build: ../nginx
    container_name: nginx-proxy
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  mongo:
    image: mongo:latest
    container_name: mongodb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis-1:
    image: redis:latest
    container_name: redis-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    networks:
      - app-network

  redis-2:
    image: redis:latest
    container_name: redis-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    networks:
      - app-network

  redis-3:
    image: redis:latest
    container_name: redis-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes
    networks:
      - app-network
  
  redis-cluster-init:
    image: redis:latest
    container_name: redis-cluster-init
    networks:
      - app-network
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    command: >
      sh -c "
      sleep 5 &&
      if redis-cli -h redis-1 -p 6379 cluster info 2>/dev/null | grep -q 'cluster_state:ok'; then
        echo 'Redis cluster already initialized';
        exit 0;
      fi &&
      redis-cli --cluster create redis-1:6379 redis-2:6379 redis-3:6379 --cluster-replicas 0 --cluster-yes
      "

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
