{{- range $serviceName, $service := .Values.services }}
{{- if $service.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dacn.fullname" $ }}-{{ $serviceName }}
  labels:
    {{- include "dacn.serviceLabels" (list $serviceName $) | nindent 4 }}
spec:
  {{- if not $service.autoscaling.enabled }}
  replicas: {{ $service.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "dacn.serviceSelectorLabels" (list $serviceName $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dacn.serviceSelectorLabels" (list $serviceName $) | nindent 8 }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $serviceName }}
          image: "{{ $service.image.repository }}:{{ $service.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $service.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.service.port }}
              protocol: TCP
          {{- if $service.env }}
          env:
            {{- range $key, $value := $service.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- if $service.healthCheck }}
          livenessProbe:
            httpGet:
              path: {{ $service.healthCheck.path }}
              port: http
          readinessProbe:
            httpGet:
              path: {{ $service.healthCheck.path }}
              port: http
          {{- end }}
          resources:
            {{- toYaml $service.resources | nindent 12 }}
{{- end }}
{{- end }}
